{% extends "base.html" %}
{% block title %}Something Went Wrong | {{ company_name }}{% endblock %}
{% block content %}
<div class="error-page">
  <div>
    <div class="code">5<span>0</span>0</div>
    <h2>Something went wrong on our end</h2>
    <p style="max-width:420px; margin: 0 auto var(--sp-3);">Our team has been notified. Please try again shortly, or contact us directly if the issue continues.</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary">Back to Home <i class="fa-solid fa-arrow-right"></i></a>
  </div>
</div>
{% endblock %}
